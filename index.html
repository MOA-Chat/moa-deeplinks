<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>MOA 초대</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p  { font-size: 15px; color: #666; margin-bottom: 32px; line-height: 1.5; }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-primary {
      background: #FF6B35;
      color: #fff;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .note { font-size: 13px; color: #aaa; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="icon.png" alt="MOA">
    <h1>MOA 그룹 초대</h1>
    <p id="desc">초대 링크를 받았습니다.<br>아래 버튼으로 참여하세요.</p>

    <button class="btn btn-primary" id="openBtn">앱으로 열기</button>
    <a class="btn btn-secondary" id="downloadBtn" href="#">앱 다운로드</a>
    <p class="note" id="note"></p>
  </div>

  <script>
    // URL에서 초대 코드 추출
    // 형식: /invite/CODE 또는 ?code=CODE
    var code = null;
    var pathMatch = window.location.pathname.match(/\/invite\/([a-zA-Z0-9_-]+)/);
    if (pathMatch) {
      code = pathMatch[1];
    } else {
      var queryMatch = window.location.search.match(/[?&]code=([a-zA-Z0-9_-]+)/);
      if (queryMatch) code = queryMatch[1];
    }

    // 플랫폼 감지
    var ua = navigator.userAgent || '';
    var isIOS = /iphone|ipad|ipod/i.test(ua);
    var isAndroid = /android/i.test(ua);

    var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.moa.chatapp';
    var appStoreUrl  = 'https://apps.apple.com/app/id6773242400';
    var storeUrl = isIOS ? appStoreUrl : playStoreUrl;

    // 다운로드 버튼
    document.getElementById('downloadBtn').href = storeUrl;

    // 앱으로 열기 버튼
    document.getElementById('openBtn').addEventListener('click', function() {
      if (!code) {
        window.location.href = storeUrl;
        return;
      }

      var appUrl = 'gchat://invite?code=' + code;

      // 앱 실행 시도
      window.location.href = appUrl;

      // 1.5초 후 앱이 열리지 않으면 스토어로 이동
      var fallback = setTimeout(function() {
        window.location.href = storeUrl;
      }, 1500);

      // 페이지가 blur되면 앱이 열린 것 → 타임아웃 취소
      window.addEventListener('blur', function() {
        clearTimeout(fallback);
      }, { once: true });
    });

    // 코드 없으면 안내 변경
    if (!code) {
      document.getElementById('desc').textContent = '유효하지 않은 초대 링크입니다.';
      document.getElementById('openBtn').style.display = 'none';
    }
  </script>
</body>
</html>
